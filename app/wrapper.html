<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>xEduOrg</title>
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
  <!-- Set the theme (light/dark) and language as early as possible to avoid a
       flash on load; the full logic lives in wrapper.js. -->
  <script>try {
      var c = JSON.parse(localStorage.getItem('eduxept_cockpit') || '{}');
      var q = new URLSearchParams(location.search);
      var t = q.get('theme') || c.theme || 'dark';
      if (t === 'dark') {
          document.documentElement.classList.add('dark');
      }
      document.documentElement.setAttribute('data-theme', t === 'dark' ? 'black' : 'light');
      document.documentElement.lang = (q.get('language') || c.language || 'de').toLowerCase();
  } catch (e) {
  }</script>
  <!-- Preact + htm via ESM CDN (no build step), pinned to one Preact instance.
       Must precede any <script type="module"> — Firefox (unlike Chrome)
       rejects an import map once a module load has started. -->
  <script type="importmap">
    {
      "imports": {
        "preact": "https://esm.sh/preact@10.24.3",
        "preact/hooks": "https://esm.sh/preact@10.24.3/hooks",
        "htm": "https://esm.sh/htm@3.1.1"
      }
    }
  </script>
  <!-- i18next via CDN (UMD, no build step): core + http-backend (lädt
       locales/{lng}.json per fetch) + browser-languagedetector. Die Erkennung
       nutzt den ?language=-URL-Parameter (gleiche Quelle wie wrapper.js), dann
       localStorage/navigator; Fallback de. Der Sprachwechsel im Wrapper ruft
       i18next.changeLanguage() auf (siehe wrapper.js).
       Verwendung: await window.i18nReady; i18next.t('key') -->
  <script src="https://cdn.jsdelivr.net/npm/i18next@26.3.4/i18next.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@4.0.0/i18nextHttpBackend.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@8.2.1/i18nextBrowserLanguageDetector.min.js"></script>
  <script type="module">
    window.i18nReady = i18next
        .use(i18nextHttpBackend)
        .use(i18nextBrowserLanguageDetector)
        .init({
          fallbackLng: 'de',
          supportedLngs: ['de', 'fr', 'it', 'en'],
          load: 'languageOnly',
          detection: {order: ['querystring', 'localStorage', 'navigator'], lookupQuerystring: 'language'},
          backend: {loadPath: 'locales/{{lng}}.json'},
          interpolation: {escapeValue: false}
        });
    // window.i18nReady.then(() => console.log('i18next ready:', i18next.language, '·', i18next.t('master_data')));
  </script>
  <!-- daisyUI 5 via CDN (no build step): component classes (card, input, select, btn, alert, …) for Tailwind CSS. -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
  <!-- Tailwind CSS v4 – Play CDN (development). -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="app.css">
</head>
<body class="h-screen overflow-hidden">
<div id="app" class="flex flex-col h-screen overflow-hidden"></div>
<script type="module" src="wrapper.js"></script>
</body>
</html>
